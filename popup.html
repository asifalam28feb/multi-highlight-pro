<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; font-family: 'Segoe UI', sans-serif; padding: 15px; background: #fff; }
    h3 { margin: 0 0 10px 0; font-size: 16px; color: #333; }
    textarea { 
      width: 100%; height: 100px; padding: 8px; border: 1px solid #ccc;
      border-radius: 4px; box-sizing: border-box; resize: none; font-size: 13px;
    }
    .btn-group { display: flex; gap: 8px; margin-top: 10px; }
    button { 
      flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 4px;
      font-weight: bold; transition: opacity 0.2s;
    }
    #runBtn { background: #4285f4; color: white; }
    #clearBtn { background: #ea4335; color: white; }
    button:hover { opacity: 0.9; }
    .status { font-size: 11px; color: #777; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <h3>Multi-Highlight</h3>
  <textarea id="words" placeholder="Enter words to highlight...&#10;One word per line."></textarea>
  <div class="btn-group">
    <button id="runBtn">Highlight All</button>
    <button id="clearBtn">Clear</button>
  </div>
  <div class="status">Changes save automatically.</div>
  <script src="popup.js"></script>
</body>
</html>
